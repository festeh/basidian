<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" id="constellation-svg">
                <defs>
                    <!-- Deep Space App Icon Background -->
                    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
                        <stop offset="0%" stop-color="#1f1140"/>
                        <stop offset="60%" stop-color="#0b0614"/>
                        <stop offset="100%" stop-color="#05020a"/>
                    </radialGradient>

                    <!-- Glow Filters -->
                    <filter id="glow-node" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="6" result="blur1"/>
                        <feGaussianBlur stdDeviation="12" result="blur2"/>
                        <feMerge>
                            <feMergeNode in="blur2"/>
                            <feMergeNode in="blur1"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>

                    <filter id="glow-center" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="10" result="blur1"/>
                        <feGaussianBlur stdDeviation="20" result="blur2"/>
                        <feMerge>
                            <feMergeNode in="blur2"/>
                            <feMergeNode in="blur1"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>

                    <!-- Line Gradients (Center to Outer Nodes) -->
                    <linearGradient id="line-top" x1="256" y1="256" x2="256" y2="110" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#D500F9" stop-opacity="0.8"/>
                    </linearGradient>
                    <linearGradient id="line-right" x1="256" y1="256" x2="400" y2="210" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#651FFF" stop-opacity="0.8"/>
                    </linearGradient>
                    <linearGradient id="line-br" x1="256" y1="256" x2="330" y2="380" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#2979FF" stop-opacity="0.8"/>
                    </linearGradient>
                    <linearGradient id="line-bl" x1="256" y1="256" x2="140" y2="350" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.8"/>
                    </linearGradient>
                    <linearGradient id="line-left" x1="256" y1="256" x2="110" y2="200" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
                        <stop offset="100%" stop-color="#B388FF" stop-opacity="0.8"/>
                    </linearGradient>
                </defs>

                <!-- App Icon Base -->
                <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>

                <!-- Orbit / Grid Rings -->
                <circle cx="256" cy="256" r="140" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="2" stroke-dasharray="8 8"/>
                <circle cx="256" cy="256" r="220" fill="none" stroke="#00FFFF" stroke-opacity="0.03" stroke-width="1" stroke-dasharray="4 16"/>

                <!-- Network Connections (Background / Cross) -->
                <g stroke-width="2" opacity="0.4" stroke-linecap="round">
                    <line x1="256" y1="110" x2="400" y2="210" stroke="#8a2be2"/>
                    <line x1="400" y1="210" x2="330" y2="380" stroke="#4c1d95"/>
                    <line x1="330" y1="380" x2="140" y2="350" stroke="#00bfff"/>
                    <line x1="140" y1="350" x2="110" y2="200" stroke="#00ced1"/>
                    <line x1="110" y1="200" x2="256" y2="110" stroke="#da70d6"/>

                    <!-- Internal complex links -->
                    <line x1="110" y1="200" x2="400" y2="210" stroke="#651FFF" opacity="0.3"/>
                    <line x1="256" y1="110" x2="140" y2="350" stroke="#00FFFF" opacity="0.2"/>
                </g>

                <!-- Primary Neural Links (Spokes) -->
                <g stroke-width="5" stroke-linecap="round">
                    <line x1="256" y1="256" x2="256" y2="110" stroke="url(#line-top)"/>
                    <line x1="256" y1="256" x2="400" y2="210" stroke="url(#line-right)"/>
                    <line x1="256" y1="256" x2="330" y2="380" stroke="url(#line-br)"/>
                    <line x1="256" y1="256" x2="140" y2="350" stroke="url(#line-bl)"/>
                    <line x1="256" y1="256" x2="110" y2="200" stroke="url(#line-left)"/>
                </g>

                <!-- Distant Background Particles -->
                <g fill="#FFFFFF" opacity="0.3">
                    <circle cx="380" cy="120" r="2"/>
                    <circle cx="120" cy="420" r="2"/>
                    <circle cx="450" cy="350" r="1.5"/>
                    <circle cx="80" cy="150" r="2.5"/>
                    <circle cx="260" cy="50" r="1"/>
                </g>

                <!-- Outer Nodes -->
                <g filter="url(#glow-node)">
                    <!-- Top Node -->
                    <circle cx="256" cy="110" r="14" fill="#D500F9"/>
                    <circle cx="256" cy="110" r="6" fill="#FFFFFF"/>

                    <!-- Right Node -->
                    <circle cx="400" cy="210" r="12" fill="#651FFF"/>
                    <circle cx="400" cy="210" r="5" fill="#FFFFFF"/>

                    <!-- Bottom Right Node -->
                    <circle cx="330" cy="380" r="16" fill="#2979FF"/>
                    <circle cx="330" cy="380" r="7" fill="#FFFFFF"/>

                    <!-- Bottom Left Node -->
                    <circle cx="140" cy="350" r="18" fill="#00E5FF"/>
                    <circle cx="140" cy="350" r="8" fill="#FFFFFF"/>

                    <!-- Left Node -->
                    <circle cx="110" cy="200" r="10" fill="#B388FF"/>
                    <circle cx="110" cy="200" r="4" fill="#FFFFFF"/>
                </g>

                <!-- Center Core Node -->
                <g filter="url(#glow-center)">
                    <circle cx="256" cy="256" r="26" fill="#00FFFF" opacity="0.9"/>
                    <circle cx="256" cy="256" r="12" fill="#FFFFFF"/>
                </g>
            </svg>